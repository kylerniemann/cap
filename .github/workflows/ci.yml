name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke
        run: npm run smoke

      - name: Upload Foxglove bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: foxe-bundle
          path: "*.foxe"
