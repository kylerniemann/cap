  <text x="112" y="282" fill="#C7D2FE" font-family="Consolas, monospace" font-size="14">for (const range of findRanges("/vehicle_speed_kmph.data", "&gt;", 10, 5)) {</text>
  <text x="112" y="308" fill="#C7D2FE" font-family="Consolas, monospace" font-size="14">  matchRange(range.startNs, range.endNs, "Speed &gt; 10 km/h for 5 seconds", {</text>
  <text x="112" y="334" fill="#C7D2FE" font-family="Consolas, monospace" font-size="14">    signal: "/vehicle_speed_kmph.data", topic: "/vehicle_speed_kmph"</text>
  <text x="112" y="360" fill="#C7D2FE" font-family="Consolas, monospace" font-size="14">  });</text>
  <text x="112" y="386" fill="#C7D2FE" font-family="Consolas, monospace" font-size="14">}</text>
